name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python test suite ──────────────────────────────────────────────────────
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch (avoids 4 GB CUDA wheels)
        run: |
          pip install torch==2.4.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Install project dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run test suite
        run: pytest tests/ -v -m "not slow"

  # ── Frontend validation ────────────────────────────────────────────────────
  frontend:
    name: Frontend build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npm run typecheck
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm run test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api

  # ── API smoke test ─────────────────────────────────────────────────────────
  api-smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    needs: [python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch==2.4.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install -r requirements.txt --quiet

      - name: Start API and smoke test
        run: |
          uvicorn api.main:app --port 8000 &
          echo "Waiting for API to start..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/topologies && break || sleep 2
          done
          echo "Running smoke test..."
          RESULT=$(curl -sf -X POST http://localhost:8000/run \
            -H 'Content-Type: application/json' \
            -d '{"N":10,"T":50,"topology":"er","p_er":0.5,"seed":1}')
          echo "$RESULT" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'run_id' in d, 'run_id missing from response'
          assert 'metrics' in d, 'metrics missing from response'
          assert len(d['final_agent_states']) == 10, 'wrong agent count'
          print('Smoke test passed. run_id:', d['run_id'])
          "

server {
    listen 80;
    server_name mosaic-research.duckdns.org;

    # ── Static React build ─────────────────────────────────────────
    root /home/mosaic/app/frontend/dist;
    index index.html;

    # SPA routing — unknown paths return index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → uvicorn ────────────────────────────────────────
    # Frontend calls /api/run, /api/topologies, etc.
    # nginx strips the /api prefix before forwarding to uvicorn.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ── Security headers ───────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Compression ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}

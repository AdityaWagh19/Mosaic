<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mosaic</title>
    <script>
      // GitHub Pages SPA routing — single page apps on GitHub Pages
      // This script stores the current path in sessionStorage, then
      // redirects to index.html which restores it before React Router loads.
      // Source: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // 1 = keep /Mosaic/ prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

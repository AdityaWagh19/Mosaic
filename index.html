    <!--
      GitHub Pages SPA routing redirect handler.
      When 404.html redirects to index.html with ?p=..., this script restores
      the original URL path before React Router hydrates so deep links work.
      See: frontend/public/404.html
    -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('gh-pages-redirect');
        if (redirect) {
          sessionStorage.removeItem('gh-pages-redirect');
          var base = window.location.pathname.replace(/\/[^/]*$/, '') || '/';
          history.replaceState(null, '', base + redirect.slice(1));
        }
      })();
    </script>
